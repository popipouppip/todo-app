<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачник</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="add-panel">
    <button class="add-btn critical"  onclick="openModal('critical')">
      <span class="material-symbols-rounded">local_fire_department</span>Сверхважная
    </button>
    <button class="add-btn important" onclick="openModal('important')">
      <span class="material-symbols-rounded">bolt</span>Важная
    </button>
    <button class="add-btn low"       onclick="openModal('low')">
      <span class="material-symbols-rounded">eco</span>Не очень
    </button>
    <button class="add-btn nodate"    onclick="openModal('nodate')">
      <span class="material-symbols-rounded">schedule</span>Без срока
    </button>
  </div>

  <div class="counters">
    <span class="counter critical"><span class="material-symbols-rounded">local_fire_department</span><span id="cnt-critical">0</span></span>
    <span class="counter important"><span class="material-symbols-rounded">bolt</span><span id="cnt-important">0</span></span>
    <span class="counter low"><span class="material-symbols-rounded">eco</span><span id="cnt-low">0</span></span>
    <span class="counter nodate"><span class="material-symbols-rounded">schedule</span><span id="cnt-nodate">0</span></span>
  </div>

  <div class="world" id="world"></div>

  <!-- Добавить задачу -->
  <div class="modal-overlay" id="modal" onclick="closeOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-dot" id="modal-dot"></div>
        <h3 id="modal-title">Новая задача</h3>
      </div>
      <textarea id="task-text" placeholder="Что нужно сделать?" rows="3"></textarea>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">
          <span class="material-symbols-rounded">close</span>Отмена
        </button>
        <button class="btn-save" onclick="saveTask()">
          <span class="material-symbols-rounded">add</span>Добавить
        </button>
      </div>
    </div>
  </div>

  <!-- Детали задачи -->
  <div class="modal-overlay" id="detail-modal" onclick="closeDetailOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-dot" id="detail-dot"></div>
        <div class="detail-type" id="detail-type"></div>
      </div>
      <p class="detail-text" id="detail-text"></p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeDetail()">
          <span class="material-symbols-rounded">close</span>Закрыть
        </button>
        <button class="btn-delete" onclick="deleteDetail()">
          <span class="material-symbols-rounded">delete</span>Удалить
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
