<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачник</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars" id="stars"></div>

  <!-- Кнопки добавления -->
  <div class="add-panel">
    <button class="add-btn critical"  onclick="openModal('critical')">🔥 Сверхважная</button>
    <button class="add-btn important" onclick="openModal('important')">⚡ Важная</button>
    <button class="add-btn low"       onclick="openModal('low')">🌿 Не очень</button>
    <button class="add-btn nodate"    onclick="openModal('nodate')">🕐 Без срока</button>
  </div>

  <!-- Счётчики -->
  <div class="counters">
    <span class="counter critical">🔥 <span id="cnt-critical">0</span></span>
    <span class="counter important">⚡ <span id="cnt-important">0</span></span>
    <span class="counter low">🌿 <span id="cnt-low">0</span></span>
    <span class="counter nodate">🕐 <span id="cnt-nodate">0</span></span>
  </div>

  <!-- Пространство задач -->
  <div class="world" id="world"></div>

  <!-- Модалка -->
  <div class="modal-overlay" id="modal" onclick="closeOutside(event)">
    <div class="modal">
      <div class="modal-dot" id="modal-dot"></div>
      <h3 id="modal-title">Новая задача</h3>
      <textarea id="task-text" placeholder="Что нужно сделать?" rows="3"></textarea>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
        <button class="btn-save"   onclick="saveTask()">Добавить</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
